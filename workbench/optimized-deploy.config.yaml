# Deploy Cosmos3-Nano-Policy-DROID as a Nebius serverless endpoint with the ablation-winning
# latency optimizations baked in. INFRA PROVISIONING ONLY — the ablation that identifies which
# techniques win lives in the repo (policy/, run_matrix.py, aggregate.py). Read
# results/aggregate/waterfall_end_to_end.json and results/aggregate/quality_comparison.json
# (the lossy gate) before trusting `configuration`.

deploy:
  runtime: serverless              # managed Nebius AI endpoint — npa provisions the infra
  model: nvidia/Cosmos3-Nano-Policy-DROID
  gpu_type: gpu-h100-sxm           # npa GPU_TYPE_DEFAULTS platform id (gpu-h100-sxm | gpu-h200-sxm | gpu-l40s-d | gpu-rtx6000)
  gpu_preset: 1gpu-16vcpu-200gb    # one-H100 preset
  project: serverless-challenge
  name: cosmos-policy
  # The final end-to-end configuration (E4), matching policy/serving.py::engine_args(E4).
  configuration: E4
  engine_args:
    - --diffusion-attention-config.per_role.self.backend FLASH_ATTN
    - --compilation-config '{"mode":"VLLM_COMPILE","cudagraph_mode":"FULL_AND_PIECEWISE"}'
    - --quantization fp8                     # lossy; gated by the RoboLab subset

test:
  # A DROID action-chunk request (not a text/image prompt): instruction + observation refs.
  request:
    instruction: "pick up the red cube and place it in the bowl"
  infer_uri: s3://serverless-challenge/cosmos3-ablation-results/policy-droid/infer/

secrets:
  hf_token_env: HF_TOKEN
