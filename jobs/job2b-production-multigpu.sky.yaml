# Job 2b — production validation on a MULTI-GPU vLLM-Omni deployment (spec §3 multi-GPU, §5.3.3).
#
# INFRA PROVISIONING ONLY. The multi-GPU counterpart to Job 2: validates the production baseline
# (E0) and final optimized config (E6) served by vLLM-Omni tensor-parallel across N GPUs, with the
# §5.3.3 latency parallelism (CFG-Parallel: cond/uncond on separate ranks; or Ulysses context
# parallelism). Job 2 is the single-GPU production number; this is the same configs at multi-GPU
# scale. Kept OFF the single-GPU waterfall (§3: "Do not mix different GPU counts").
#
# Also collects vLLM's OWN torch profiler traces (VLLM_TORCH_PROFILER_DIR) -> the Perfetto
# dashboard for the vLLM path (the native-PyTorch traces come from Job 1 via profile_and_upload.sh).
#
#   sky jobs launch jobs/job2b-production-multigpu.sky.yaml --secret HF_TOKEN \
#     --env CONFIGS=E0,E6 --env TENSOR_PARALLEL_SIZE=2 --env PARALLEL=cfg

name: cosmos-policy-production-multigpu

resources:
  cloud: kubernetes
  accelerators: H200:2              # >=2 GPUs -> CFG-/Context-Parallel become runnable (§5.3.3)
  cpus: 32+
  memory: 256+
  image_id: "docker:vllm/vllm-omni:cosmos3"   # VERIFY tag

num_nodes: 1

envs:
  REPO_URL: "https://github.com/ana-alekseeva/cosmos-serving.git"   # VERIFY
  REPO_REF: "main"
  # MODEL is read from config/experiment.yaml (single source of truth), not an env var.
  CONFIGS: "E0,E6"                                  # production baseline + final ONLY (§4)
  TENSOR_PARALLEL_SIZE: "2"                         # serving.engine_args reads this -> vLLM-Omni TP
  PARALLEL: "cfg"                                   # cfg (CFG-Parallel) | ulysses (context-parallel)
  VLLM_TORCH_PROFILER_DIR: "/local/vllm_traces"     # vLLM writes Chrome traces here on /start_profile
  OUTPUT_URI: "s3://serverless-challenge/cosmos3-ablation-results/production-multigpu/"
  AWS_ENDPOINT_URL: "https://storage.eu-north1.nebius.cloud"

setup: |
  set -euo pipefail
  command -v uv >/dev/null 2>&1 || curl -LsSf https://astral.sh/uv/install.sh | sh
  export PATH="$HOME/.local/bin:$PATH"
  rm -rf cosmos-serving && git clone --depth 1 --branch "${REPO_REF}" "${REPO_URL}" cosmos-serving
  cd cosmos-serving && uv sync && uv pip install cosmos-guardrail

run: |
  set -euo pipefail
  export PATH="$HOME/.local/bin:$PATH"
  : "${HF_TOKEN:?HF_TOKEN required}"
  hf auth login --token "${HF_TOKEN}" --add-to-git-credential || true
  cd cosmos-serving && nvidia-smi

  # Same real replay set as Jobs 1/2 (deterministic capture -> identical 50 DROID observations, §8).
  mkdir -p /local/replay "${VLLM_TORCH_PROFILER_DIR}"
  uv pip install tensorflow-datasets tensorflow-cpu
  uv run python -m policy.capture --n 50 --out /local/replay

  # Production baseline + final on a MULTI-GPU vLLM-Omni deployment: tensor-parallel across
  # ${TENSOR_PARALLEL_SIZE} GPUs with ${PARALLEL}-parallel (§5.3.3). serving.engine_args reads
  # TENSOR_PARALLEL_SIZE / PARALLEL from the env; vLLM flushes profiler traces to
  # VLLM_TORCH_PROFILER_DIR when the serving path calls /start_profile (VERIFY in policy/serving.py).
  uv run python run_matrix.py \
    --input-manifest /local/replay/manifest.json \
    --output-dir results-production-mgpu \
    --backend vllm \
    --configurations "${CONFIGS}"
  uv run python aggregate.py --out-dir results-production-mgpu

  # Publish: raw per-config logs + aggregate figures + vLLM Perfetto traces (all to S3).
  if command -v aws >/dev/null 2>&1; then
    aws s3 cp results-production-mgpu/ "${OUTPUT_URI}raw/" --recursive --exclude "aggregate/*" --endpoint-url "${AWS_ENDPOINT_URL}"
    aws s3 cp results-production-mgpu/aggregate/ "${OUTPUT_URI}" --recursive --endpoint-url "${AWS_ENDPOINT_URL}"
    aws s3 cp "${VLLM_TORCH_PROFILER_DIR}/" "${OUTPUT_URI}raw/traces/" --recursive --endpoint-url "${AWS_ENDPOINT_URL}" || true
    echo "raw + traces -> ${OUTPUT_URI}raw/ ; aggregate -> ${OUTPUT_URI}"
  fi
