# Job 2 — production-engine validation.
#
# Runs the complete E0-E4 production ladder through vLLM (Reasoner, Qwen3-VL path) and
# vLLM-Omni (Generator / full policy). Override CONFIGS=E0,E4 only for a cheaper
# baseline-versus-final validation after the complete ladder has been measured.
#
#   sky jobs launch jobs/job2-production-validation.sky.yaml --secret HF_TOKEN \
#     --env CONFIGS=E0,E1,E2,E3,E4

name: cosmos-policy-production

resources:
  cloud: kubernetes
  accelerators: H100:1              # one H100, single-request batch-1 latency
  cpus: 16+
  memory: 128+
  image_id: "docker:vllm/vllm-omni:cosmos3"   # VERIFY tag (or split: vllm-only vs vllm-omni image)

num_nodes: 1

envs:
  REPO_URL: "https://github.com/ana-alekseeva/cosmos-serving.git"   # VERIFY
  REPO_REF: "main"
  # MODEL is read from config/experiment.yaml (single source of truth), not an env var.
  CONFIGS: "E0,E1,E2,E3,E4"        # complete cumulative production ladder
  VLLM_TORCH_PROFILER_DIR: "/local/vllm_traces"   # vLLM writes Chrome traces here on /start_profile
  OUTPUT_URI: "s3://serverless-challenge/cosmos3-ablation-results/production/"
  AWS_ENDPOINT_URL: "https://storage.eu-north1.nebius.cloud"

setup: |
  set -euo pipefail
  command -v uv >/dev/null 2>&1 || curl -LsSf https://astral.sh/uv/install.sh | sh
  export PATH="$HOME/.local/bin:$PATH"
  rm -rf cosmos-serving && git clone --depth 1 --branch "${REPO_REF}" "${REPO_URL}" cosmos-serving
  cd cosmos-serving && uv sync && uv pip install cosmos-guardrail

run: |
  set -euo pipefail
  export PATH="$HOME/.local/bin:$PATH"
  : "${HF_TOKEN:?HF_TOKEN required}"
  hf auth login --token "${HF_TOKEN}" --add-to-git-credential || true
  cd cosmos-serving && nvidia-smi
  # Same real replay set as Job 1: capture is deterministic, so the 50 DROID observations
  # are identical here. Production is always real (--backend vllm below).
  mkdir -p /local/replay "${VLLM_TORCH_PROFILER_DIR}"
  uv pip install tensorflow-datasets tensorflow-cpu
  uv run python -m policy.capture --n 50 --out /local/replay   # writes /local/replay/manifest.json

  # Complete E0-E4 ladder through the vLLM / vLLM-Omni serving stack.
  uv run python run_matrix.py \
    --input-manifest /local/replay/manifest.json \
    --output-dir results-production \
    --backend vllm \
    --configurations "${CONFIGS}"
  uv run python aggregate.py --out-dir results-production

  if command -v aws >/dev/null 2>&1; then
    aws s3 cp results-production/ "${OUTPUT_URI}raw/" --recursive --exclude "aggregate/*" --endpoint-url "${AWS_ENDPOINT_URL}"
    aws s3 cp results-production/aggregate/ "${OUTPUT_URI}" --recursive --endpoint-url "${AWS_ENDPOINT_URL}"
    aws s3 cp "${VLLM_TORCH_PROFILER_DIR}/" "${OUTPUT_URI}raw/traces/" --recursive --endpoint-url "${AWS_ENDPOINT_URL}" || true
  fi
