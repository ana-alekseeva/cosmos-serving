# Job 1b — separate multi-GPU experiment (specification_revised.txt §3).
#
# INFRA PROVISIONING ONLY. Kept OFF the primary waterfall — "Do not mix different GPU counts
# in the primary waterfall" (§3). Provisions 2 GPUs and compares CFG-Parallel (only if the
# action pipeline uses CFG) and Ulysses Context-Parallel against the best single-GPU config
# (final E6). CPU offload / HSDP / VAE-patch-parallel are excluded (memory-oriented or
# inapplicable to action output, §3).
#
#   sky jobs launch jobs/job1b-multigpu.sky.yaml --secret HF_TOKEN \
#     --env OUTPUT_URI=s3://serverless-challenge/cosmos3-ablation-results/multigpu/

name: cosmos-policy-multigpu

resources:
  cloud: kubernetes
  accelerators: H200:2              # two GPUs -> CFG-/Context-Parallel become runnable
  cpus: 32+
  memory: 256+
  image_id: "docker:vllm/vllm-omni:cosmos3"   # VERIFY tag

num_nodes: 1

envs:
  REPO_URL: "https://github.com/ana-alekseeva/cosmos-serving.git"   # VERIFY
  REPO_REF: "main"
  # MODEL is read from config/experiment.yaml (single source of truth), not an env var.
  OUTPUT_URI: "s3://serverless-challenge/cosmos3-ablation-results/multigpu/"
  AWS_ENDPOINT_URL: "https://storage.eu-north1.nebius.cloud"

setup: |
  set -euo pipefail
  command -v uv >/dev/null 2>&1 || curl -LsSf https://astral.sh/uv/install.sh | sh
  export PATH="$HOME/.local/bin:$PATH"
  rm -rf cosmos-serving && git clone --depth 1 --branch "${REPO_REF}" "${REPO_URL}" cosmos-serving
  cd cosmos-serving && uv sync && uv pip install cosmos-guardrail

run: |
  set -euo pipefail
  export PATH="$HOME/.local/bin:$PATH"
  : "${HF_TOKEN:?HF_TOKEN required}"
  hf auth login --token "${HF_TOKEN}" --add-to-git-credential || true
  cd cosmos-serving && nvidia-smi
  # Same real replay set as Job 1 (deterministic capture -> identical 50 DROID observations, §8).
  mkdir -p /local/replay
  uv pip install tensorflow-datasets tensorflow-cpu
  uv run python -m policy.capture --n 50 --out /local/replay   # writes /local/replay/manifest.json

  # CFG-Parallel + Ulysses Context-Parallel vs best single-GPU (final E6). vLLM-Omni launches
  # with --tensor-parallel-size 2 for the parallel strategies (VERIFY flags in policy/serving.py).
  uv run python run_multigpu.py --backend vllm --manifest /local/replay/manifest.json --out-dir results

  if command -v aws >/dev/null 2>&1; then
    aws s3 cp results/ "${OUTPUT_URI}raw/" --recursive --exclude "aggregate/*" --endpoint-url "${AWS_ENDPOINT_URL}"
    aws s3 cp results/aggregate/multigpu.json "${OUTPUT_URI}" --endpoint-url "${AWS_ENDPOINT_URL}"
  fi
