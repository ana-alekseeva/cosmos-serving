# Job 3 — RoboLab subset evaluation (specification_revised.txt §4, §5).
#
# INFRA PROVISIONING ONLY. The quality gate for the lossy techniques (Cache-DiT, FP8): run the
# stratified 18-task subset (3 capability groups x 3 difficulty x 2 tasks, 10 episodes each,
# §5) and REJECT any optimization that regresses task success beyond SUCCESS_DROP_THRESHOLD.
# Runs three configurations (§4): baseline, final optimized PyTorch, final production.
#
# HARDWARE — a DIFFERENT stack than the ablation. RoboLab needs Isaac Sim 5.x + Isaac Lab on an
# RT-core GPU (>=48 GB): a Nebius RT-core platform (gpu-l40s-d / RTX PRO 6000), NOT gpu-h200-sxm
# (H200 has no RT cores). The spec prefers a simulator job connected to a SEPARATE inference
# endpoint so rendering/physics don't compete with inference on the same GPU (§4). Every
# `# VERIFY` must be confirmed on-box before the numbers are trustworthy.
#
#   sky jobs launch jobs/job3-robolab-subset.sky.yaml -c robolab-subset \
#     --env COSMOS_ENDPOINT_BASELINE=https://<baseline> \
#     --env COSMOS_ENDPOINT_OPTIMIZED=https://<optimized> \
#     --env OUTPUT_URI=s3://serverless-challenge/robolab-eval-results/subset/

name: robolab-subset

resources:
  cloud: kubernetes                 # npa-provisioned managed Nebius infra
  accelerators: L40S:1              # VERIFY: RT-core GPU, >=48 GB (Isaac Sim rendering)
  cpus: 16+
  memory: 128+
  disk_size: 64
  image_id: "docker:nvcr.io/nvidia/isaac-lab:2.3.2"   # VERIFY: Isaac Sim 5.x + Isaac Lab tag

num_nodes: 1

envs:
  REPO_URL: "https://github.com/ana-alekseeva/cosmos-serving.git"   # VERIFY
  REPO_REF: "main"
  ROBOLAB_REPO: "https://github.com/NVLabs/RoboLab.git"             # VERIFY ref + access
  ROBOLAB_REF: "main"
  MODE: "subset"                    # 18-task stratified subset (§5)
  EPISODES_PER_TASK: "10"
  # Endpoints to score. Baseline = plain deploy; optimized = jobs/deploy-optimized.sh; the
  # "final production" config is the optimized vLLM-Omni endpoint (same as optimized here).
  COSMOS_ENDPOINT_BASELINE: ""      # VERIFY URL
  COSMOS_ENDPOINT_OPTIMIZED: ""     # VERIFY URL
  SUCCESS_DROP_THRESHOLD: "0.03"    # matches policy/robolab.py
  OUTPUT_URI: "s3://serverless-challenge/robolab-eval-results/subset/"
  AWS_ENDPOINT_URL: "https://storage.eu-north1.nebius.cloud"

setup: |
  set -euo pipefail
  command -v uv >/dev/null 2>&1 || curl -LsSf https://astral.sh/uv/install.sh | sh
  export PATH="$HOME/.local/bin:$PATH"
  rm -rf cosmos-serving && git clone --depth 1 --branch "${REPO_REF}" "${REPO_URL}" cosmos-serving
  cd cosmos-serving && uv sync
  # RoboLab (IsaacLab manipulation). VERIFY the install (uv sync vs pip -e .) + assets download.
  rm -rf RoboLab && git clone --depth 1 --branch "${ROBOLAB_REF}" "${ROBOLAB_REPO}" RoboLab

run: |
  set -euo pipefail
  export PATH="$HOME/.local/bin:$PATH"
  cd cosmos-serving && nvidia-smi

  # The stratified 18-task subset the gate scores. policy/dataset.quality_subset() is the
  # canonical list; emit it for the RoboLab runner.
  uv run python -c "import json; from policy.dataset import quality_subset; \
    print(json.dumps([t.__dict__ for t in quality_subset()]))" > /local/subset.json
  echo "subset tasks:"; cat /local/subset.json

  # VERIFY: drive RoboLab rollouts for each task against each endpoint (baseline + optimized),
  # writing per-task success JSON. The runner entrypoint / flags are unpublished — confirm:
  #   python RoboLab/policies/<policy>/run.py --task <T> --num-envs ${EPISODES_PER_TASK} \
  #     --cosmos-endpoint <URL> --output-dir /local/robolab/<endpoint>/
  # Then gate with the repo's comparator (drop <= SUCCESS_DROP_THRESHOLD).
  #   uv run python run_robolab.py --backend vllm \
  #     --endpoint-baseline "${COSMOS_ENDPOINT_BASELINE}" \
  #     --endpoint-candidate "${COSMOS_ENDPOINT_OPTIMIZED}" --out-dir results
  echo "MODE=${MODE} threshold=${SUCCESS_DROP_THRESHOLD} — wire the RoboLab runner (VERIFY) then gate."

  if command -v aws >/dev/null 2>&1 && [ -d results ]; then
    aws s3 cp results/ "${OUTPUT_URI}raw/" --recursive --exclude "aggregate/*" --endpoint-url "${AWS_ENDPOINT_URL}"
    [ -d results/aggregate ] && aws s3 cp results/aggregate/ "${OUTPUT_URI}" --recursive --endpoint-url "${AWS_ENDPOINT_URL}"
  fi
