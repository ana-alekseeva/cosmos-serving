apiVersion: npa.workflow/v0.0.1
kind: Workflow

metadata:
  name: cosmos3-optimize
  description: Reproduce + attribute Cosmos 3 serving optimizations; emit the contribution waterfall.
  skypilotTwin: npa/workflows/workbench/skypilot/cosmos3-optimize.yaml

config:
  bucket: example-bucket
  prefix: "runs/{{run.id}}/cosmos3-optimize"
  cosmos3_model: "nvidia/Cosmos3-Nano"
  tower: reasoner            # reasoner (1x H200) | generator (2x H200)
  preset: full              # none | full  (or use `enable` for a subset)
  waterfall_uri: "s3://{{config.bucket}}/{{config.prefix}}/waterfall/"

resources:
  reasoner_gpu:
    cloud: kubernetes
    accelerators: H200:1
    cpus: 32
    memory: 200Gi
  generator_gpu:
    cloud: kubernetes
    accelerators: H200:2      # 2 GPUs so CFG-Parallel can be selected
    cpus: 64
    memory: 320Gi

initial: ablate

states:
  ablate:
    description: Run the cumulative technique ladder and produce the waterfall + breakdown.
    toolRef: workbench.cosmos3.optimize
    resources: reasoner_gpu   # switch to generator_gpu for --tower generator
    outputs:
      - uri: "{{config.waterfall_uri}}waterfall.png"
        schema: npa.workbench.cosmos3.optimize.v1
      - uri: "{{config.waterfall_uri}}ablation.json"
        schema: npa.workbench.cosmos3.optimize.v1
    terminal: true
